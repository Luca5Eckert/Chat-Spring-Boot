spring.application.name=chatonline

server.port=${port:8081}

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/chat_db
spring.datasource.username=ChAtUserTry
spring.datasource.password=PasswordTRyChat

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
logging.level.org.hibernate=DEBUG

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.isolation-level=TRANSACTION_READ_COMMITTED